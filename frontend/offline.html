<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline · Study Sphere AI</title>
  <link rel="icon" type="image/png" href="/assets/logo.png" />
  <link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/png" href="/assets/logo-192.png">
<link rel="apple-touch-icon" href="/assets/logo-192.png">
<meta name="theme-color" content="#4F46E5">
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: grid; place-items: center;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: radial-gradient(1200px 600px at 50% -10%, #1e2a5e 0%, #0b1020 60%);
      color: #e6e9f5; text-align: center; padding: 2rem;
    }
    .card {
      max-width: 460px; padding: 2.5rem 2rem;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 24px; box-shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
    }
    /* BRANDING: clean logo, no gradient badge / circle behind it */
    .icon {
      width: 96px; height: 96px; margin: 0 auto 1.25rem;
      display: grid; place-items: center;
      background: transparent; box-shadow: none;
    }
    h1 { font-size: 1.5rem; margin: 0 0 .5rem; }
    p { color: #aab2d5; line-height: 1.6; margin: 0 0 1.75rem; }
    button {
      border: 0; cursor: pointer; padding: .85rem 1.6rem; border-radius: 14px;
      font-weight: 600; font-size: .98rem; color: #fff;
      background: linear-gradient(135deg, #6d7bff, #a855f7);
      box-shadow: 0 8px 24px rgba(109, 123, 255, 0.45);
      transition: transform .15s ease, box-shadow .15s ease;
    }
    button:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(109, 123, 255, 0.6); }
    .logo { width: 96px; height: 96px; object-fit: contain; }
  </style>
</head>
<body>
  <main class="card">
    <div class="icon"><img class="logo" src="/assets/logo.png" alt="Study Sphere AI" /></div>
    <h1>You're offline</h1>
    <p>Study Sphere AI can't reach the internet right now. Your saved chats and notes are still available once you reconnect.</p>
    <button onclick="location.reload()">Try again</button>
  </main>
  <script>
    // Auto-retry when the connection returns.
    window.addEventListener('online', () => location.reload());
  </script>
</body>
</html>
