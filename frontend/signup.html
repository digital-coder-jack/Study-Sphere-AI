<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <script>
    (function () {
      try {
        var t = localStorage.getItem('ss_theme') || 'dark';
        document.documentElement.setAttribute('data-theme', t);
      } catch (e) { document.documentElement.setAttribute('data-theme', 'dark'); }
    })();
  </script>
  <title>Create account · Study Sphere AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/auth.css" />
  
  <!-- Vercel Speed Insights -->
  <script type="module">
    import { injectSpeedInsights } from 'https://cdn.jsdelivr.net/npm/@vercel/speed-insights@2.0.0/dist/index.mjs';
    injectSpeedInsights();
  </script>
</head>
<body>
  <div id="particles-js"></div>
  <div id="toast-wrap"></div>
  <a class="back-home" href="/"><i class="fas fa-arrow-left"></i> Home</a>
  <button class="theme-toggle floating" id="themeToggle" aria-label="Toggle theme" title="Toggle light / dark">
    <i class="fas fa-moon"></i><i class="fas fa-sun"></i>
  </button>

  <main class="auth-wrap">
    <section class="auth-card glass">
      <a class="brand" href="/"><span class="logo">🌌</span><span>Study<span class="grad-text">Sphere</span></span></a>
      <h1>Create your account</h1>
      <p class="sub">Start studying smarter in under a minute</p>

      <div class="form-msg" id="formMsg"></div>

      <form id="signupForm" novalidate>
        <div class="field">
          <label for="name">Full name</label>
          <div class="input-wrap">
            <i class="fas fa-user lead-icon"></i>
            <input type="text" id="name" name="name" placeholder="Jane Doe" autocomplete="name" required />
          </div>
        </div>
        <div class="field">
          <label for="email">Email</label>
          <div class="input-wrap">
            <i class="fas fa-envelope lead-icon"></i>
            <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" required />
          </div>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <div class="input-wrap">
            <i class="fas fa-lock lead-icon"></i>
            <input type="password" id="password" name="password" placeholder="At least 6 characters" autocomplete="new-password" required />
            <button type="button" class="toggle-pw" data-target="password"><i class="fas fa-eye"></i></button>
          </div>
          <div class="pw-strength"><span id="pwBar"></span></div>
        </div>
        <button type="submit" class="btn block" id="submitBtn"><i class="fas fa-user-plus"></i> Create account</button>
      </form>

      <div class="auth-or">or</div>
      <button type="button" class="btn ghost block" data-guest><i class="fas fa-user-secret"></i> Continue as Guest</button>

      <p class="auth-foot">Already have an account? <a href="/login">Log in</a></p>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
  <script src="/js/config.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
