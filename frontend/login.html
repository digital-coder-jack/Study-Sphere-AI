<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <link rel="icon" type="image/svg+xml" href="/assets/logo.png" />
  <link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/png" href="/assets/logo-192.png">
<link rel="apple-touch-icon" href="/assets/logo-192.png">
<meta name="theme-color" content="#4F46E5">
  <script>
    (function () {
      try {
        var r = document.documentElement;
        r.setAttribute('data-theme', localStorage.getItem('ss_theme') || 'dark');
        r.setAttribute('data-accent', localStorage.getItem('ss_accent') || 'violet');
        r.setAttribute('data-font', localStorage.getItem('ss_font') || 'md');
      } catch (e) { document.documentElement.setAttribute('data-theme', 'dark'); }
    })();
  </script>
  <title>Log in · Study Sphere AI</title>
  <meta name="theme-color" content="#4F46E5" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="AI Notebook" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/assets/logo-192.png" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="/css/premium-design-system.css" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/auth.css" />
  <link rel="stylesheet" href="/css/responsive.css" />
  
  <!-- Vercel Speed Insights -->
  <script type="module">
    import { injectSpeedInsights } from 'https://cdn.jsdelivr.net/npm/@vercel/speed-insights@2.0.0/dist/index.mjs';
    injectSpeedInsights();
  </script>

  <!-- Premium layer (loaded last to override legacy tokens) -->
  <link rel="stylesheet" href="/css/theme.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/auth-premium.css" />
</head>
<body>
  <div id="particles-js"></div>
  <div id="toast-wrap"></div>
  <a class="back-home" href="/"><i class="fas fa-arrow-left"></i> Home</a>
  <button class="theme-toggle floating" id="themeToggle" aria-label="Toggle theme" title="Toggle light / dark">
    <i class="fas fa-moon"></i><i class="fas fa-sun"></i>
  </button>

  <main class="auth-wrap">
    <section class="auth-card glass">
      <a class="brand" href="/"><span class="logo"><img src="/assets/logo.png" alt="AI Notebook Logo" class="logo-img" /></span><span>Study <span class="grad-text">Sphere</span></span></a>
      <h1>Welcome back</h1>
      <p class="sub">Log in to continue your learning journey</p>

      <div class="form-msg" id="formMsg"></div>

      <form id="loginForm" novalidate>
        <div class="field">
          <label for="identifier">Email or Username</label>
          <div class="input-wrap">
            <i class="fas fa-user lead-icon"></i>
            <input type="text" id="identifier" name="identifier" placeholder="you@example.com or janedoe" required />
          </div>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <div class="input-wrap">
            <i class="fas fa-lock lead-icon"></i>
            <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required />
            <button type="button" class="toggle-pw" data-target="password"><i class="fas fa-eye"></i></button>
          </div>
        </div>
        <div class="auth-row">
          <label><input type="checkbox" id="remember" checked /> Remember me</label>
          <a href="/forgot">Forgot password?</a>
        </div>
        <button type="submit" class="btn block" id="submitBtn"><i class="fas fa-right-to-bracket"></i> Log in</button>
      </form>

      <div class="auth-or">or</div>
      <button type="button" class="btn ghost block" data-guest><i class="fas fa-user-secret"></i> Continue as Guest</button>

      <p class="auth-foot">Don't have an account? <a href="/signup">Create one</a></p>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
  <script src="/js/config.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/motion.js"></script>
  <script src="/js/pwa.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
